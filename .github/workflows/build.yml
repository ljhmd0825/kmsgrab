name: Release kmsgrab aarch64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in ARM64 Container
        # QEMU를 사용하여 x86_64 위에서 arm64 컨테이너를 실행합니다.
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu24.04
          
          # 컨테이너 내부에서 실행될 명령들
          run: |
            apt-get update
            apt-get install -y build-essential libdrm-dev libpng-dev zlib1g-dev pkg-config
            
            # 빌드 (컨테이너 내부이므로 일반 gcc 사용)
            gcc -O3 -s -o kmsgrab_aarch64 kmsgrab.c \
              $(pkg-config --cflags --libs libdrm libpng) \
              -static -lpthread -lm -lz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: kmsgrab_aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
