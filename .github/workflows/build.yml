name: Auto Release kmsgrab aarch64

on:
  push:
    branches:
      - main  # 또는 사용자님의 기본 브랜치 명 (master 등)
  workflow_dispatch: # 수동 실행 버튼도 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 릴리즈를 쓰기 위한 권한
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker 레이어 캐싱 설정 (빌드 속도 향상)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: kms-builder:latest
          outputs: type=docker,dest=/tmp/kms-builder.tar
          cache-from: type=gha # GitHub Actions 전용 캐시 사용 (가장 빠름)
          cache-to: type=gha,mode=max

      - name: Load Docker Image
        run: docker load -i /tmp/kms-builder.tar

      - name: Compile inside Docker
        run: |
          docker run --rm -v $(pwd):/build -w /build kms-builder:latest sh -c "
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig && \
            aarch64-linux-gnu-gcc -O3 -s -o kmsgrab_aarch64 kmsgrab.c \
            \$(pkg-config --cflags --libs libdrm libpng) \
            -static -lpthread -lm -lz"

      - name: Auto Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest      # 태그 이름을 'latest'로 고정
          name: Latest Build    # 릴리즈 제목
          draft: false
          prerelease: false
          files: kmsgrab_aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
