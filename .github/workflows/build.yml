name: Release kmsgrab aarch64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Multi-arch and Install Dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libdrm-dev:arm64 libpng-dev:arm64 zlib1g-dev:arm64 pkg-config

      - name: Compile and Strip
        run: |
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          aarch64-linux-gnu-gcc -O3 -s -o kmsgrab_aarch64 kmsgrab.c $(pkg-config --cflags --libs libdrm libpng) -static -lpthread -lm -lz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: kmsgrab_aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
