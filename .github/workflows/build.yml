name: Release kmsgrab aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: kms-builder:latest
          outputs: type=docker,dest=/tmp/kms-builder.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load Docker Image
        run: docker load -i /tmp/kms-builder.tar

      - name: Compile inside Docker
        run: |
          docker run --rm -v $(pwd):/build -w /build kms-builder:latest sh -c "
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig && \
            aarch64-linux-gnu-gcc -O3 -o kmsgrab_aarch64 kmsgrab.c \
            \$(pkg-config --cflags --libs libdrm libpng) \
            -static -lpthread -lm -lz && \
            aarch64-linux-gnu-strip --strip-all kmsgrab_aarch64"

      - name: Auto Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          draft: false
          prerelease: false
          files: kmsgrab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
